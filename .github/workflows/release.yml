name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build .deb package
        run: |
          chmod +x build-deb.sh
          ./build-deb.sh

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: dist/*.deb

  build-rpm:
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: dnf install -y rpm-build python3-devel

      - name: Build .rpm package
        run: |
          chmod +x build-rpm.sh
          ./build-rpm.sh

      - name: Upload .rpm artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-package
          path: dist/*.rpm

  release:
    needs: [build-deb, build-rpm]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download .deb artifact
        uses: actions/download-artifact@v4
        with:
          name: deb-package
          path: dist/

      - name: Download .rpm artifact
        uses: actions/download-artifact@v4
        with:
          name: rpm-package
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*.deb
            dist/*.rpm
          generate_release_notes: true
          body: |
            ## Installation

            ### Debian/Ubuntu
            ```bash
            sudo dpkg -i proton-drive-gtk_*.deb
            sudo apt-get install -f  # Install dependencies if needed
            ```

            ### Fedora/RHEL
            ```bash
            sudo dnf install proton-drive-gtk-*.rpm
            ```

            ### From source
            ```bash
            git clone https://github.com/achrafsoltani/proton-drive-gtk.git
            cd proton-drive-gtk
            ./install.sh
            ```

            ## Requirements
            - rclone 1.61+ configured with `protondrive` remote
            - Run `rclone config` to set up your Proton account
